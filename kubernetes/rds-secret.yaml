# RDS MySQL Secret - stores connection credentials for the AWS RDS MySQL instance.
# Populate the values below with your actual RDS endpoint and credentials
# before applying this manifest. Never commit real credentials to source control;
# use AWS Secrets Manager or Kubernetes External Secrets Operator in production.
apiVersion: v1
kind: Secret
metadata:
  name: rds-mysql-secret
  namespace: wanderlust
type: Opaque
stringData:
  MYSQL_HOST: "<RDS_ENDPOINT>"          # e.g. wanderlust-mysql.abc123.us-east-2.rds.amazonaws.com
  MYSQL_PORT: "3306"
  MYSQL_USER: "wanderlust_user"
  MYSQL_PASSWORD: "<REPLACE_WITH_SECURE_PASSWORD>"
  MYSQL_DATABASE: "wanderlust"
